<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Advanced Typing Speed Tester</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      min-height:100vh;
      background:linear-gradient(135deg,#0f172a,#1e293b,#111827);
      display:flex;
      justify-content:center;
      align-items:flex-start;
      padding:40px 20px;
      overflow-y:auto;
      color:white;
    }

    .container{
      width:1000px;
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.1);
      backdrop-filter:blur(15px);
      border-radius:25px;
      padding:35px;
      box-shadow:0 10px 40px rgba(0,0,0,0.4);
    }

    .header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
      gap:15px;
      margin-bottom:25px;
    }

    h1{
      font-size:32px;
      font-weight:700;
    }

    .difficulty-select{
      padding:12px 18px;
      border:none;
      border-radius:12px;
      background:#7c3aed;
      color:white;
      font-size:16px;
      outline:none;
      cursor:pointer;
    }

    .typing-box{
      background:rgba(255,255,255,0.05);
      border-radius:20px;
      padding:30px;
      line-height:2;
      font-size:22px;
      margin-bottom:25px;
      min-height:220px;
      border:1px solid rgba(255,255,255,0.08);
    }

    .typing-box span.correct{
      color:#22c55e;
    }

    .typing-box span.wrong{
      color:#ef4444;
      background:rgba(239,68,68,0.15);
      border-radius:4px;
    }

    .typing-box span.active{
      background:#7c3aed;
      border-radius:4px;
      color:white;
    }

    textarea{
      width:100%;
      height:180px;
      padding:25px;
      border:none;
      outline:none;
      resize:none;
      border-radius:20px;
      background:rgba(255,255,255,0.08);
      color:white;
      font-size:18px;
      line-height:1.8;
      margin-bottom:25px;
      border:1px solid rgba(255,255,255,0.08);
    }

    textarea:focus{
      border:1px solid #7c3aed;
      box-shadow:0 0 20px rgba(124,58,237,0.4);
    }

    textarea::placeholder{
      color:#94a3b8;
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:20px;
      margin-bottom:25px;
    }

    .card{
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:18px;
      padding:20px;
      text-align:center;
    }

    .card h2{
      font-size:15px;
      color:#cbd5e1;
      margin-bottom:10px;
    }

    .card span{
      font-size:32px;
      font-weight:700;
    }

    .progress-container{
      width:100%;
      height:14px;
      background:rgba(255,255,255,0.08);
      border-radius:20px;
      overflow:hidden;
      margin-bottom:25px;
    }

    .progress-bar{
      width:0%;
      height:100%;
      background:linear-gradient(90deg,#7c3aed,#06b6d4);
      transition:0.2s;
    }

    .buttons{
      display:flex;
      gap:15px;
      flex-wrap:wrap;
    }

    button{
      flex:1;
      padding:16px;
      border:none;
      border-radius:15px;
      font-size:17px;
      font-weight:600;
      cursor:pointer;
      transition:0.3s;
      color:white;
    }

    .restart-btn{
      background:linear-gradient(135deg,#7c3aed,#06b6d4);
    }

    .theme-btn{
      background:linear-gradient(135deg,#f59e0b,#ef4444);
    }

    button:hover{
      transform:translateY(-3px);
    }

    .light-mode{
      background:#f1f5f9;
      color:#111827;
    }

    .light-mode .container{
      background:white;
      color:#111827;
    }

    .light-mode textarea{
      color:#111827;
      background:#f8fafc;
    }

    .light-mode .typing-box{
      background:#f8fafc;
      color:#111827;
    }

    .light-mode .card{
      background:#f8fafc;
    }

    @media(max-width:900px){

      .stats{
        grid-template-columns:repeat(2,1fr);
      }

    }

    @media(max-width:600px){

      .stats{
        grid-template-columns:1fr;
      }

      .typing-box{
        font-size:18px;
      }

      textarea{
        font-size:16px;
      }

      h1{
        font-size:25px;
      }

    }

  </style>
</head>
<body>

  <div class="container">

    <div class="header">

      <h1>Advanced Typing Speed Tester</h1>

      <select class="difficulty-select" id="difficulty">

        <option value="easy">Easy</option>
        <option value="medium">Medium</option>
        <option value="hard">Hard</option>

      </select>

    </div>

    <div class="typing-box" id="typingText"></div>

    <textarea 
      id="inputBox"
      placeholder="Start typing here..."
    ></textarea>

    <div class="progress-container">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="stats">

      <div class="card">
        <h2>WPM</h2>
        <span id="wpm">0</span>
      </div>

      <div class="card">
        <h2>Accuracy</h2>
        <span id="accuracy">0%</span>
      </div>

      <div class="card">
        <h2>Mistakes</h2>
        <span id="mistakes">0</span>
      </div>

      <div class="card">
        <h2>Time</h2>
        <span id="time">60</span>
      </div>

      <div class="card">
        <h2>Progress</h2>
        <span id="progressText">0%</span>
      </div>

    </div>

    <div class="buttons">

      <button class="restart-btn" onclick="restartTest()">
        Restart Test
      </button>

      <button class="theme-btn" onclick="toggleTheme()">
        Toggle Theme
      </button>

    </div>

  </div>

  <script>

    const paragraphs = {

      easy:[
        "Typing every day improves speed accuracy and confidence while using computers for work study and communication.",
        "Frontend development uses HTML CSS and JavaScript to build interactive and modern websites."
      ],

      medium:[
        "Programming regularly helps developers improve logical thinking debugging skills and overall software development experience across different technologies and frameworks.",
        "JavaScript is one of the most important programming languages because it powers interactive websites applications and many modern frontend systems."
      ],

      hard:[
        "Artificial intelligence is rapidly transforming industries by automating repetitive workflows improving data analysis and assisting developers with advanced problem solving techniques across modern applications.",
        "Building complex frontend applications requires strong understanding of responsive design state management asynchronous programming and efficient user interface optimization."
      ]

    };

    const typingText = document.getElementById("typingText");
    const inputBox = document.getElementById("inputBox");

    const wpmText = document.getElementById("wpm");
    const accuracyText = document.getElementById("accuracy");
    const mistakesText = document.getElementById("mistakes");
    const timeText = document.getElementById("time");
    const progressText = document.getElementById("progressText");

    const progressBar = document.getElementById("progressBar");

    const difficulty = document.getElementById("difficulty");

    let timer;
    let maxTime = 60;
    let timeLeft = maxTime;
    let started = false;

    let mistakes = 0;
    let charIndex = 0;
    let currentText = "";

    function loadParagraph(){

      const level = difficulty.value;

      const data = paragraphs[level];

      currentText = data[Math.floor(Math.random() * data.length)];

      typingText.innerHTML = "";

      currentText.split("").forEach(char => {

        const span = document.createElement("span");

        span.innerText = char;

        typingText.appendChild(span);

      });

      typingText.querySelectorAll("span")[0].classList.add("active");

    }

    loadParagraph();

    inputBox.addEventListener("input", () => {

      const characters = typingText.querySelectorAll("span");

      const typedChar = inputBox.value.charAt(charIndex);

      if(!started){

        timer = setInterval(initTimer,1000);

        started = true;

      }

      if(typedChar == null){

        charIndex--;

      }
      else{

        if(typedChar === characters[charIndex].innerText){

          characters[charIndex].classList.add("correct");

        }
        else{

          mistakes++;

          mistakesText.innerText = mistakes;

          characters[charIndex].classList.add("wrong");

        }

        charIndex++;

      }

      characters.forEach(span => span.classList.remove("active"));

      if(characters[charIndex]){

        characters[charIndex].classList.add("active");

      }

      // Accuracy
      let accuracy = Math.floor(((charIndex - mistakes) / charIndex) * 100);

      accuracy = accuracy < 0 || !accuracy ? 0 : accuracy;

      accuracyText.innerText = accuracy + "%";

      // WPM
      let wpm = Math.floor((((charIndex - mistakes) / 5) / (maxTime - timeLeft)) * 60);

      wpm = wpm < 0 || !wpm || wpm === Infinity ? 0 : wpm;

      wpmText.innerText = wpm;

      // Progress
      let progress = Math.floor((charIndex / currentText.length) * 100);

      progressBar.style.width = progress + "%";

      progressText.innerText = progress + "%";

      if(charIndex === currentText.length){

        clearInterval(timer);

      }

    });

    function initTimer(){

      if(timeLeft > 0){

        timeLeft--;

        timeText.innerText = timeLeft;

      }
      else{

        clearInterval(timer);

        inputBox.disabled = true;

      }

    }

    function restartTest(){

      clearInterval(timer);

      timeLeft = maxTime;
      started = false;

      mistakes = 0;
      charIndex = 0;

      inputBox.value = "";
      inputBox.disabled = false;

      timeText.innerText = timeLeft;
      wpmText.innerText = 0;
      accuracyText.innerText = "0%";
      mistakesText.innerText = 0;
      progressText.innerText = "0%";

      progressBar.style.width = "0%";

      loadParagraph();

    }

    difficulty.addEventListener("change",restartTest);

    function toggleTheme(){

      document.body.classList.toggle("light-mode");

    }

  </script>

</body>
</html>
